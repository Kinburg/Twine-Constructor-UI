<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }
    img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      opacity: 0;
      animation: fadeIn 0.5s ease 0.1s forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }
  </style>
</head>
<body>
  <img src="./Logo.png" alt="Purl">
</body>
</html>
