name: Auto Version

on:
  push:
    branches:
      - pre-release

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: pre-release

      - name: Determine version bump
        id: bump
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if [[ "$COMMIT_MSG" =~ ^Merge\  ]]; then
            echo "bump=none" >> $GITHUB_OUTPUT
          elif [[ "$COMMIT_MSG" =~ ^feat(\(.+\))?: ]]; then
            echo "bump=minor" >> $GITHUB_OUTPUT
          elif [[ "$COMMIT_MSG" =~ ^(update|fix)(\(.+\))?: ]]; then
            echo "bump=patch" >> $GITHUB_OUTPUT
          elif [[ "$COMMIT_MSG" =~ ^(site|chore)(\(.+\))?: ]]; then
            echo "bump=none" >> $GITHUB_OUTPUT
          else
            echo "bump=invalid" >> $GITHUB_OUTPUT
          fi

      - name: Validate commit message format
        if: steps.bump.outputs.bump == 'invalid'
        run: |
          echo ""
          echo "Неверный формат сообщения коммита."
          echo ""
          echo "Допустимые форматы:"
          echo "  feat: описание    ->  minor (1.x.0) — новая функциональность"
          echo "  update: описание  ->  patch (1.2.x) — улучшение существующего"
          echo "  fix: описание     ->  patch (1.2.x) — баг-фикс"
          echo "  site: описание    ->  без изменения версии"
          echo "  chore: описание   ->  без изменения версии"
          echo ""
          echo "Ваш коммит: \"${{ github.event.head_commit.message }}\""
          echo ""
          exit 1

      - name: Setup Node
        if: steps.bump.outputs.bump != 'none' && steps.bump.outputs.bump != 'invalid'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git
        if: steps.bump.outputs.bump != 'none' && steps.bump.outputs.bump != 'invalid'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version in package.json (no tag)
        if: steps.bump.outputs.bump != 'none' && steps.bump.outputs.bump != 'invalid'
        run: |
          npm version ${{ steps.bump.outputs.bump }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          git add package.json package-lock.json
          git commit -m "chore: bump version to $NEW_VERSION"
          git push
