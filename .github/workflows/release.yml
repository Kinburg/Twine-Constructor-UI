name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout git repo
        uses: actions/checkout@v4

      - name: Install Node and NPM
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate icons for electron-builder (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p build/icons
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get install -y imagemagick
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install imagemagick 2>/dev/null || true
          fi
          magick public/Icon.PNG -resize 512x512 build/icons/512x512.png
          magick public/Icon.PNG -resize 256x256 build/icons/256x256.png
          magick public/Icon.PNG -resize 128x128 build/icons/128x128.png

      - name: Build application
        run: npm run dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.zip
            release/*.dmg
            release/*.AppImage
            !release/builder-debug.yml

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
